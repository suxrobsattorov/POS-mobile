name: pos_mobile
description: POS Kassa Mobile - Professional Point of Sale for Android/iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Local Database (Offline)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  dio: ^5.4.3
  connectivity_plus: ^6.0.3

  # Navigation
  go_router: ^14.2.7

  # DI
  get_it: ^8.0.0

  # UI
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.3.3
  rxdart: ^0.27.7
  permission_handler: ^11.3.0

  # Barcode
  mobile_scanner: ^6.0.0

  # HTTP Inspector
  alice: ^0.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  hive_generator: ^2.0.1
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
